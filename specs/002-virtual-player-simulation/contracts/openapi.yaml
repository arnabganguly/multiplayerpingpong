openapi: 3.1.0
info:
  title: Ping Pong Simulation Admin API
  version: 0.1.0
  description: Admin API for configuring, starting, stopping, and observing virtual player simulations.
servers:
  - url: /admin/simulations
security:
  - AdminBearerAuth: []
paths:
  /runs:
    get:
      summary: List recent simulation runs
      operationId: listSimulationRuns
      responses:
        "200":
          description: Recent simulation runs
          content:
            application/json:
              schema:
                type: object
                required: [runs]
                properties:
                  runs:
                    type: array
                    items:
                      $ref: "#/components/schemas/SimulationRunSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      summary: Start a simulation run
      operationId: startSimulationRun
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SimulationStartRequest"
      responses:
        "201":
          description: Simulation run accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimulationRunSummary"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Another simulation is already active
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /runs/{runId}:
    get:
      summary: Get simulation run status
      operationId: getSimulationRun
      parameters:
        - $ref: "#/components/parameters/RunId"
      responses:
        "200":
          description: Simulation run status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimulationRunSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /runs/{runId}/stop:
    post:
      summary: Stop a simulation run
      operationId: stopSimulationRun
      parameters:
        - $ref: "#/components/parameters/RunId"
      responses:
        "202":
          description: Stop requested
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimulationRunSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Run is already terminal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /status:
    get:
      summary: Get simulator service status
      operationId: getSimulatorStatus
      responses:
        "200":
          description: Simulator status and configuration limits
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimulatorStatus"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
components:
  securitySchemes:
    AdminBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque-admin-token
  parameters:
    RunId:
      name: runId
      in: path
      required: true
      schema:
        type: string
        minLength: 8
  responses:
    Unauthorized:
      description: Missing or invalid admin credentials
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Simulation is disabled or caller is not permitted
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Run was not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ValidationError:
      description: Invalid simulation configuration
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    SimulationStartRequest:
      type: object
      required:
        - virtualPlayers
        - matches
        - durationSeconds
        - behaviorProfile
        - updateFrequencyHz
        - disconnectRatePerMinute
        - reconnectRatePerMinute
      properties:
        virtualPlayers:
          type: integer
          minimum: 1
          maximum: 1000
        matches:
          type: integer
          minimum: 1
        durationSeconds:
          type: integer
          minimum: 30
        behaviorProfile:
          type: string
          enum: [balanced, aggressive, defensive, erratic]
        updateFrequencyHz:
          type: number
          exclusiveMinimum: 0
        disconnectRatePerMinute:
          type: number
          minimum: 0
        reconnectRatePerMinute:
          type: number
          minimum: 0
        seed:
          type: string
          description: Optional seed for repeatable behavior.
    SimulationRunSummary:
      type: object
      required:
        - runId
        - status
        - configuration
        - activeVirtualPlayers
        - activeSimulatedMatches
        - websocketConnections
        - messagesPerSecond
        - failures
        - elapsedSeconds
        - remainingSeconds
        - createdAt
      properties:
        runId:
          type: string
        status:
          type: string
          enum: [requested, starting, running, stopping, completed, failed]
        configuration:
          $ref: "#/components/schemas/SimulationConfiguration"
        activeVirtualPlayers:
          type: integer
          minimum: 0
        activeSimulatedMatches:
          type: integer
          minimum: 0
        websocketConnections:
          type: integer
          minimum: 0
        messagesPerSecond:
          type: number
          minimum: 0
        failures:
          type: integer
          minimum: 0
        elapsedSeconds:
          type: integer
          minimum: 0
        remainingSeconds:
          type: integer
          minimum: 0
        createdAt:
          type: string
          format: date-time
        startedAt:
          type: string
          format: date-time
        stoppedAt:
          type: string
          format: date-time
        lastError:
          type: string
    SimulationConfiguration:
      allOf:
        - $ref: "#/components/schemas/SimulationStartRequest"
    SimulatorStatus:
      type: object
      required:
        - enabled
        - environment
        - activeRun
        - limits
      properties:
        enabled:
          type: boolean
        environment:
          type: string
        activeRun:
          oneOf:
            - $ref: "#/components/schemas/SimulationRunSummary"
            - type: "null"
        limits:
          type: object
          required: [maxVirtualPlayers, maxDurationSeconds, maxUpdateFrequencyHz]
          properties:
            maxVirtualPlayers:
              type: integer
            maxDurationSeconds:
              type: integer
            maxUpdateFrequencyHz:
              type: number
    ErrorResponse:
      type: object
      required: [code, message, retryable]
      properties:
        code:
          type: string
        message:
          type: string
        retryable:
          type: boolean
