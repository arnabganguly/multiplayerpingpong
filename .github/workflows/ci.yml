name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - 001-multiplayer-ping-pong

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm run lint
      - run: npm run format
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
      - run: docker build -f apps/web/Dockerfile -t pingpong-web:ci .
      - run: docker build -f apps/realtime/Dockerfile -t pingpong-realtime:ci .
      - run: npx kubeconform -summary -ignore-missing-schemas infra/k8s/base/*.yaml
