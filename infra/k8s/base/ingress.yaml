apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pingpong
  namespace: pingpong
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/backend-protocol: HTTP
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - pingpong.example.com
      secretName: pingpong-tls
  rules:
    - host: pingpong.example.com
      http:
        paths:
          - path: /api/simulator
            pathType: Prefix
            backend:
              service:
                name: load-generator-api
                port:
                  name: http
          - path: /admin/simulations
            pathType: Prefix
            backend:
              service:
                name: load-generator-api
                port:
                  name: http
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: pingpong-realtime
                port:
                  name: http
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: pingpong-realtime
                port:
                  name: http
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pingpong-web
                port:
                  name: http
