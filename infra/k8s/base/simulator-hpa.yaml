apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: load-generator
  namespace: pingpong
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: load-generator
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
