apiVersion: apps/v1
kind: Deployment
metadata:
  name: pingpong-web
  namespace: pingpong
  labels:
    app.kubernetes.io/name: pingpong-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: pingpong-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pingpong-web
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: web
          image: pingpong-web:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
---
apiVersion: v1
kind: Service
metadata:
  name: pingpong-web
  namespace: pingpong
spec:
  selector:
    app.kubernetes.io/name: pingpong-web
  ports:
    - name: http
      port: 80
      targetPort: http
