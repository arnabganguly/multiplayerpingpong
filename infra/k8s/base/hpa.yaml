apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: pingpong-web
  namespace: pingpong
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: pingpong-web
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: pingpong-realtime
  namespace: pingpong
  annotations:
    pingpong.dev/scaling-note: "v1 active online sessions are in-memory; keep maxReplicas at 1 until distributed ownership is added."
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: pingpong-realtime
  minReplicas: 1
  maxReplicas: 1
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
