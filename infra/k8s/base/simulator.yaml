apiVersion: apps/v1
kind: Deployment
metadata:
  name: load-generator
  namespace: pingpong
  labels:
    app.kubernetes.io/name: load-generator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: load-generator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: load-generator
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "8090"
    spec:
      terminationGracePeriodSeconds: 75
      securityContext:
        runAsNonRoot: true
      containers:
        - name: load-generator
          image: load-generator:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8090
              name: http
          envFrom:
            - configMapRef:
                name: pingpong-config
          env:
            - name: PORT
              value: "8090"
            - name: SIMULATION_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: pingpong-secrets
                  key: SIMULATION_ADMIN_TOKEN
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 15"]
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /api/health/ready
              port: http
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health/live
              port: http
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: load-generator-api
  namespace: pingpong
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: /metrics
    prometheus.io/port: "80"
spec:
  selector:
    app.kubernetes.io/name: load-generator
  ports:
    - name: http
      port: 80
      targetPort: http
